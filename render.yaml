services:
  # ── Backend (FastAPI) ────────────────────────────
  - type: web
    name: witness-backend
    runtime: docker
    dockerfilePath: .\backend\Dockerfile
    dockerContext: .\backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: witness-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: witness-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ENVIRONMENT
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3-haiku

  # ── Celery Worker ────────────────────────────────
  - type: worker
    name: witness-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: python -m celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: witness-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: witness-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: witness-backend
          type: web
          envVarKey: SECRET_KEY
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3-haiku
      - key: ENVIRONMENT
        value: production

  # ── Celery Beat ──────────────────────────────────
  - type: worker
    name: witness-celery-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: python -m celery -A app.celery_app.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: witness-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: witness-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: witness-backend
          type: web
          envVarKey: SECRET_KEY
      - key: ENVIRONMENT
        value: production

  # ── Frontend (NiceGUI) ───────────────────────────
  - type: web
    name: witness-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: BACKEND_URL
        fromService:
          name: witness-backend
          type: web
          property: host

# ── Databases ────────────────────────────────────
databases:
  - name: witness-db
    databaseName: witness_db
    user: witness
    plan: free

# ── Redis ────────────────────────────────────────
  - name: witness-redis
    plan: free
